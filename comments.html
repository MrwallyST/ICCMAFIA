<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads Comment Toolkit — ICCMAFIA AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08090e;--surface:#0f1015;--surface2:#16171f;--surface3:#1e1f2c;--border:#25263a;--accent:#7c6fcd;--accent2:#a78bfa;--green:#10b981;--text:#eeeef5;--muted:#94a3b8}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:32px 16px}
.container{max-width:820px;margin:0 auto}
.header{text-align:center;margin-bottom:40px}
.header h1{font-family:'Outfit',sans-serif;font-size:32px;font-weight:900;margin-bottom:8px}
.header p{color:var(--muted);font-size:14px}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;margin-bottom:28px;transition:.2s}
.back-btn:hover{color:var(--text);border-color:var(--accent)}
.filter-group-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.filter-btn:hover,.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.comment-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;transition:.2s}
.comment-card:hover{border-color:var(--accent)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.card-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:5px;background:var(--surface3);color:var(--accent2);white-space:nowrap}
.card-label{font-size:12px;color:var(--muted);font-weight:500}
.comment-text{font-size:14px;line-height:1.7;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;white-space:pre-wrap;word-break:break-word}
.copy-btn{margin-top:12px;display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.copy-btn:hover{opacity:.88;transform:translateY(-1px)}
.copy-btn.copied{background:var(--green)}
.section-title{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:32px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.stat{display:inline-block;background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--muted);margin-bottom:20px}
.stat strong{color:var(--accent2)}
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-btn">&#8592; Back to Course</a>

  <div class="header">
    <h1>&#128172; Social Comment Toolkit</h1>
    <p>Click any comment to copy it instantly. Drop these under trading threads or Sci's YouTube videos.</p>
  </div>

  <div class="stat">&#128200; Site: <strong>mrwallyst.github.io/ICCMAFIA</strong> &nbsp;|&nbsp; &#127919; Goal: Drive organic traffic from Threads</div>

  <div class="filter-group-title">📱 Short-Form (X / Threads)</div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filter('all', this)">All</button>
    <button class="filter-btn" onclick="filter('struggle', this)">Struggling Traders</button>
    <button class="filter-btn" onclick="filter('value', this)">Value Drop</button>
    <button class="filter-btn" onclick="filter('reply', this)">Reply to Flex</button>

</div>

// Assign absolute IDs so filtering doesn't break the copy index
comments.forEach((c, i) => c.id = i);

function render(data) {
  const el = document.getElementById('cards');
  el.innerHTML = '';
  if (!data.length) {
    el.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">No comments in this category.</p>';
    return;
  }
  data.forEach((c) => {
    const i = c.id;
    el.insertAdjacentHTML('beforeend', `
      <div class="comment-card" data-cat="${c.cat}">
        <div class="card-top">
          <div>
            <div class="card-tag">${c.tag}</div>
            <div class="card-label" style="margin-top:6px">${c.label}</div>
          </div>
        </div>
        <div class="comment-text" id="text-${i}">${escHtml(c.text)}</div>
        <button class="copy-btn" id="btn-${i}" onclick="copyComment(${i})">&#128203; Copy Comment</button>
      </div>`);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyComment(i) {
  const txt = comments[i].text;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('btn-' + i);
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy Comment'; btn.classList.remove('copied'); }, 2000);
  });
}

function filter(cat, el) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render(cat === 'all' ? comments : comments.filter(c => c.cat === cat));
}

render(comments);
</script>
</body>
</html>
