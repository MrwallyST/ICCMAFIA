<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradesBySci — Local Trading Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08090e;
      --surface: #0f1015;
      --surface2: #16171f;
      --surface3: #1e1f2c;
      --border: #25263a;
      --accent: #7c6fcd;
      --accent2: #a78bfa;
      --green: #10b981;
      --green-bg: rgba(16, 185, 129, 0.15);
      --red: #ef4444;
      --red-bg: rgba(239, 68, 68, 0.15);
      --text: #eeeef5;
      --muted: #94a3b8;
    }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 50px; }
    
    /* Nav */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid var(--border); background: rgba(15, 16, 21, 0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
    .nav-logo { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: #fff; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 20px; }
    .nav-logo-icon { background: linear-gradient(135deg, var(--accent2), var(--accent)); width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .nav-right a { color: var(--text); text-decoration: none; font-size: 14px; font-weight: 600; padding: 8px 16px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); transition: 0.2s; }
    .nav-right a.primary { background: var(--text); color: var(--bg); }
    .nav-right a:hover { transform: translateY(-2px); }

    /* Dashboard */
    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-family: 'Outfit', sans-serif; font-size: 32px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
    .stat-name { font-size: 13px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 32px; font-weight: 700; font-family: 'Outfit', sans-serif; }
    .stat-value.win { color: var(--green); }
    .stat-value.loss { color: var(--red); }

    /* Trades Table */
    .trades-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .trades-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border); }
    .trades-header h2 { font-size: 18px; font-family: 'Outfit', sans-serif; }
    .add-trade-btn { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .add-trade-btn:hover { background: var(--accent2); transform: translateY(-1px); }

    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { padding: 16px 20px; font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--surface2); }
    td { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    
    .badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-block; }
    .badge.long { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
    .badge.short { background: rgba(245, 158, 11, 0.15); color: #fbd38d; border: 1px solid rgba(245, 158, 11, 0.3); }
    .badge.win { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16, 185, 129, 0.3); }
    .badge.loss { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.3); }
    .badge.tag { background: var(--surface3); color: var(--muted); margin-right: 4px; border: 1px solid var(--border); }

    .action-btn { background: none; border: none; color: var(--muted); cursor: pointer; transition: 0.2s; padding: 4px; }
    .action-btn:hover { color: #fff; }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-content { background: var(--surface2); width: 100%; max-width: 600px; border-radius: 16px; border: 1px solid var(--border); padding: 30px; transform: translateY(20px); transition: 0.3s; max-height: 90vh; overflow-y: auto; }
    .modal-overlay.active .modal-content { transform: translateY(0); }
    .modal-title { font-family: 'Outfit', sans-serif; font-size: 24px; margin-bottom: 20px; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); font-weight: 600; }
    .form-control { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'Pretendard', sans-serif; outline: none; transition: 0.2s; }
    .form-control:focus { border-color: var(--accent2); }
    .form-row { display: flex; gap: 15px; }
    .form-row .form-group { flex: 1; }
    select.form-control { appearance: none; cursor: pointer; }

    /* File upload styling */
    .file-drop { border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; background: var(--surface); }
    .file-drop:hover { border-color: var(--accent2); background: rgba(167, 139, 250, 0.05); }
    .file-drop input { display: none; }
    .image-preview { width: 100%; max-height: 200px; object-fit: contain; margin-top: 10px; border-radius: 8px; display: none; border: 1px solid var(--border); }

    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
    .btn-cancel { background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn-save { background: var(--accent); border: none; color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }

    .empty-state { padding: 60px 20px; text-align: center; color: var(--muted); }
    
    /* View Modal Specific */
    .view-notes { background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; white-space: pre-wrap; line-height: 1.5; margin-top: 10px; }
    .view-image { width: 100%; max-height: 400px; object-fit: contain; border-radius: 8px; border: 1px solid var(--border); margin-top: 15px; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon">🔷</div>
    <span class="nav-logo-text">Trades<span>BySci</span></span>
  </a>
  <div class="nav-right">
    <a href="index.html">← Back to Course</a>
    <a href="#" class="primary" onclick="openAddModal()">✚ Log Trade</a>
  </div>
</nav>

<div class="container">
  <div class="header">
    <h1>Trading Journal</h1>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-name">Total P&L</div>
      <div class="stat-value" id="stat-pnl">$0.00</div>
    </div>
    <div class="stat-card">
      <div class="stat-name">Win Rate</div>
      <div class="stat-value" id="stat-winrate">0%</div>
    </div>
    <div class="stat-card">
      <div class="stat-name">Total Trades</div>
      <div class="stat-value" id="stat-count">0</div>
    </div>
  </div>

  <div class="trades-section">
    <div class="trades-header">
      <h2>Trade Log</h2>
      <button class="add-trade-btn" onclick="openAddModal()">Log New Trade</button>
    </div>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Pair</th>
            <th>Direction</th>
            <th>P&L</th>
            <th>Tags</th>
            <th style="text-align: right;">Actions</th>
          </tr>
        </thead>
        <tbody id="trades-tbody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="trade-modal" onclick="if(event.target===this) closeModal()">
  <div class="modal-content">
    <div class="modal-title" id="modal-title">Log Trade</div>
    <input type="hidden" id="trade-id">
    
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="trade-date" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Pair/Ticker</label>
        <input type="text" id="trade-pair" class="form-control" placeholder="e.g. NQ, GC, BTC" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Direction</label>
        <select id="trade-direction" class="form-control">
          <option value="Long">Long</option>
          <option value="Short">Short</option>
        </select>
      </div>
      <div class="form-group">
        <label>Result / P&L ($)</label>
        <input type="number" step="0.01" id="trade-pnl" class="form-control" placeholder="e.g. 150.00 or -50.00" required>
      </div>
    </div>

    <div class="form-group">
      <label>Tags (Comma separated)</label>
      <input type="text" id="trade-tags" class="form-control" placeholder="A+ Setup, FOMO, News, Choch">
    </div>

    <div class="form-group">
      <label>Screenshot & Chart</label>
      <label class="file-drop">
        <span>Click to upload TradingView screenshot</span>
        <input type="file" id="trade-image-input" accept="image/*">
      </label>
      <img id="trade-image-preview" class="image-preview">
      <input type="hidden" id="trade-image-data">
    </div>

    <div class="form-group">
      <label>Notes & Analysis</label>
      <textarea id="trade-notes" class="form-control" rows="4" placeholder="What was your Indication? Did you wait for the Correction?"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTrade()">Save Trade</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="modal-overlay" id="view-modal" onclick="if(event.target===this) closeViewModal()">
  <div class="modal-content">
    <div class="modal-title" id="view-title" style="margin-bottom:5px;">Trade Details</div>
    <div style="color:var(--muted); font-size:14px; margin-bottom:20px;" id="view-subtitle"></div>
    
    <div style="display:flex; gap:10px; margin-bottom:20px;" id="view-badges"></div>
    
    <div class="form-group">
      <label>Notes</label>
      <div class="view-notes" id="view-notes"></div>
    </div>
    
    <div class="form-group" id="view-image-container" style="display:none;">
      <label>Screenshot</label>
      <img id="view-image" class="view-image">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeViewModal()">Close</button>
    </div>
  </div>
</div>

<script>
  let trades = [];

  // Load from LocalStorage
  function loadTrades() {
    const raw = localStorage.getItem('tbs_journal_trades');
    if (raw) {
      try { trades = JSON.parse(raw); } catch(e) { trades = []; }
    }
  }

  function saveToStorage() {
    localStorage.setItem('tbs_journal_trades', JSON.stringify(trades));
  }

  // Downsample image to avoid blowing up localStorage
  document.getElementById('trade-image-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
      const img = new Image();
      img.onload = function() {
        // resize
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 1200;
        let width = img.width;
        let height = img.height;
        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        // compress to jpeg
        const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
        document.getElementById('trade-image-data').value = dataUrl;
        const preview = document.getElementById('trade-image-preview');
        preview.src = dataUrl;
        preview.style.display = 'block';
      }
      img.src = event.target.result;
    }
    reader.readAsDataURL(file);
  });

  function renderDashboard() {
    const tbody = document.getElementById('trades-tbody');
    tbody.innerHTML = '';

    if (trades.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">No trades logged yet. Click "Log New Trade" to start your journal.</div></td></tr>`;
      document.getElementById('stat-pnl').textContent = '$0.00';
      document.getElementById('stat-winrate').textContent = '0%';
      document.getElementById('stat-count').textContent = '0';
      return;
    }

    // Sort descending by date
    trades.sort((a,b) => new Date(b.date) - new Date(a.date));

    let totalPnl = 0;
    let wins = 0;

    trades.forEach((t, i) => {
      const pnl = parseFloat(t.pnl || 0);
      totalPnl += pnl;
      if (pnl > 0) wins++;

      const isWin = pnl >= 0;
      const winBadge = isWin ? `<span class="badge win">+$${pnl.toFixed(2)}</span>` : `<span class="badge loss">${pnl.toFixed(2)}</span>`;
      const dirBadge = t.direction === 'Long' ? `<span class="badge long">Long</span>` : `<span class="badge short">Short</span>`;
      
      let tagsHtml = '';
      if (t.tags) {
        t.tags.split(',').forEach(tag => {
          if(tag.trim()) tagsHtml += `<span class="badge tag">${tag.trim()}</span>`;
        });
      }

      const row = `
        <tr style="cursor:pointer;" onclick="viewTrade('${t.id}')">
          <td>${t.date}</td>
          <td><strong>${t.pair}</strong></td>
          <td>${dirBadge}</td>
          <td>${winBadge}</td>
          <td>${tagsHtml}</td>
          <td style="text-align: right;" onclick="event.stopPropagation()">
            <button class="action-btn" onclick="deleteTrade('${t.id}')" title="Delete">🗑️</button>
          </td>
        </tr>
      `;
      tbody.insertAdjacentHTML('beforeend', row);
    });

    const pnlEl = document.getElementById('stat-pnl');
    pnlEl.textContent = (totalPnl >= 0 ? '+$' : '-$') + Math.abs(totalPnl).toFixed(2);
    pnlEl.className = 'stat-value ' + (totalPnl >= 0 ? 'win' : 'loss');

    document.getElementById('stat-count').textContent = trades.length;
    document.getElementById('stat-winrate').textContent = Math.round((wins / trades.length) * 100) + '%';
  }

  function generateId() { return Math.random().toString(36).substr(2, 9); }

  function openAddModal() {
    document.getElementById('trade-id').value = '';
    document.getElementById('trade-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('trade-pair').value = '';
    document.getElementById('trade-pnl').value = '';
    document.getElementById('trade-tags').value = '';
    document.getElementById('trade-notes').value = '';
    document.getElementById('trade-image-data').value = '';
    document.getElementById('trade-image-preview').style.display = 'none';
    document.getElementById('trade-modal').classList.add('active');
  }

  function closeModal() { document.getElementById('trade-modal').classList.remove('active'); }
  function closeViewModal() { document.getElementById('view-modal').classList.remove('active'); }

  function saveTrade() {
    const id = document.getElementById('trade-id').value || generateId();
    const date = document.getElementById('trade-date').value;
    const pair = document.getElementById('trade-pair').value.toUpperCase();
    const direction = document.getElementById('trade-direction').value;
    const pnl = document.getElementById('trade-pnl').value;
    const tags = document.getElementById('trade-tags').value;
    const notes = document.getElementById('trade-notes').value;
    const image = document.getElementById('trade-image-data').value;

    if(!date || !pair || pnl === '') return alert("Please fill date, pair, and P&L");

    const trade = { id, date, pair, direction, pnl: parseFloat(pnl), tags, notes, image };
    
    const existing = trades.findIndex(t => t.id === id);
    if(existing >= 0) trades[existing] = trade;
    else trades.push(trade);

    saveToStorage();
    renderDashboard();
    closeModal();
  }

  function deleteTrade(id) {
    if(!confirm("Delete this trade?")) return;
    trades = trades.filter(t => t.id !== id);
    saveToStorage();
    renderDashboard();
  }

  function viewTrade(id) {
    const t = trades.find(tr => tr.id === id);
    if(!t) return;
    
    document.getElementById('view-title').textContent = `${t.pair} — ${t.direction}`;
    document.getElementById('view-subtitle').textContent = t.date;
    
    let badges = t.pnl >= 0 ? `<span class="badge win">+$${t.pnl}</span>` : `<span class="badge loss">-$${Math.abs(t.pnl)}</span>`;
    if (t.tags) t.tags.split(',').forEach(tag => badges += `<span class="badge tag">${tag.trim()}</span>`);
    document.getElementById('view-badges').innerHTML = badges;
    
    document.getElementById('view-notes').textContent = t.notes || 'No notes added.';
    
    const imgContainer = document.getElementById('view-image-container');
    if (t.image) {
      document.getElementById('view-image').src = t.image;
      imgContainer.style.display = 'block';
    } else {
      imgContainer.style.display = 'none';
    }
    
    document.getElementById('view-modal').classList.add('active');
  }

  // Init
  loadTrades();
  renderDashboard();

</script>
</body>
</html>
